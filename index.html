<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eraelysium</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#2563eb,#7c3aed);
    color:white;
    text-align:center;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

h1{
    font-size:60px;
    margin-bottom:10px;
}

p{
    font-size:20px;
    max-width:700px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:15px 35px;
    background:white;
    color:#2563eb;
    text-decoration:none;
    border-radius:50px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.1);
}

.features{
    padding:80px 20px;
}

.card{
    background:rgba(255,255,255,.1);
    padding:25px;
    border-radius:20px;
    margin:20px auto;
    max-width:500px;
}
</style>
</head>

<body>

<section class="hero">
    <h1>ERAELYSIUM</h1>
    <p>
        Welcome to a world of creativity, innovation,
        and endless possibilities.
    </p>

    <a href="https://wa.me/2349027563578?text=Hello%20I%20want%20to%20learn%20more%20about%20Eraelysium" class="btn">
        Learn More
    </a>
</section>

<section class="features">
    <div class="card">
        <h2>Innovation</h2>
        <p>Building ideas that inspire the future.</p>
    </div>

    <div class="card">
        <h2>Creativity</h2>
        <p>Turning imagination into reality.</p>
    </div>

    <div class="card">
        <h2>Community</h2>
        <p>Connecting people through great experiences.</p>
    </div>
</section>

</body>
</html>
